services:
  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    container_name: live-nginx
    restart: unless-stopped
    depends_on:
      - myapi
      - webrtc
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    pull_policy: always

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: live-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myapi
      TZ: Asia/Shanghai
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
    pull_policy: always

  redis:
    image: docker.m.daocloud.io/library/redis:7.4-alpine
    container_name: live-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    pull_policy: always

  myapi:
    build:
      context: ../myapi
      dockerfile: Dockerfile
      args:
        BUILDKIT_CONTEXT_KEEP_GIT_DIR: 1
    image: livesystem-myapi:latest
    container_name: live-myapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: myapi
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDISSON_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
    volumes:
      - ../oss-config.properties:/app/oss-config.properties:ro
    ports:
      - "8080:8080"

  coturn:
    image: docker.m.daocloud.io/coturn/coturn:4.6.2-r2
    container_name: live-coturn
    restart: unless-stopped
    network_mode: host   # TURN relay 必须用 host 网络，否则 Docker NAT 会破坏 ICE 地址映射
    command:
      - -n
      - --fingerprint
      - --lt-cred-mech
      - --user=test:123456
      - --realm=42.121.222.76
      - --listening-ip=0.0.0.0
      - --listening-port=3478
      - --external-ip=42.121.222.76
      - --min-port=49160
      - --max-port=49200
      - --no-tls
      - --no-dtls
      - --simple-log
      - --log-file=stdout
    pull_policy: always

  webrtc:
    build:
      context: ../webrtc-server
      dockerfile: Dockerfile
    container_name: live-webrtc
    restart: unless-stopped
    depends_on:
      - coturn
    environment:
      TZ: Asia/Shanghai
      WEBRTC_SERVER_PORT: 8081
      WEBRTC_STUN_URL: stun:stun.qq.com:3478,stun:stun.miwifi.com:3478
      WEBRTC_TURN_URL: turn:42.121.222.76:3478?transport=udp,turn:42.121.222.76:3478?transport=tcp
      WEBRTC_TURN_USERNAME: test
      WEBRTC_TURN_CREDENTIAL: 123456
    ports:
      - "8081:8081"

volumes:
  mysql_data:
  redis_data:
