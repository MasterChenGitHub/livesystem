server {
    listen 80;
    server_name _;

    # Allow larger request bodies when needed (media/message uploads)
    client_max_body_size 50m;

    # Forward real client info
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebRTC REST config endpoint (priority over generic /api)
    location /api/webrtc/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://webrtc:8081/api/webrtc/;
    }

    # MyAPI WebSocket 聊天长连接 (must be before /ws/ to take priority)
    location /ws/chat {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_pass http://myapi:8080/ws/chat;
    }

    # WebRTC signaling websocket
    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_pass http://webrtc:8081/ws/;
    }

    # MyAPI REST endpoints
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://myapi:8080/api/;
    }

    # Health check for reverse proxy itself
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
