# Local coturn config for development (LAN/testing)
listening-port=3478
listening-ip=0.0.0.0

# Auth
realm=local.test
fingerprint
lt-cred-mech
user=test:123456

# Relay port range (keep small for local testing)
min-port=49160
max-port=49200

# Disable TLS for local dev
no-tls
no-dtls

# Optional hardening / noise reduction
no-multicast-peers
simple-log
verbose
