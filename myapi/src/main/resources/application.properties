spring.application.name=myapi
spring.config.import=optional:file:../oss-config.properties,optional:file:/app/oss-config.properties

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:myapi}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

cache.redisson.enabled=${REDISSON_ENABLED:true}
cache.redisson.host=${REDIS_HOST:localhost}
cache.redisson.port=${REDIS_PORT:6379}
cache.redisson.password=${REDIS_PASSWORD:}
cache.redisson.database=${REDIS_DB:0}

aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:}
aliyun.oss.access-key-id=${ALIYUN_OSS_ACCESS_KEY_ID:}
aliyun.oss.access-key-secret=${ALIYUN_OSS_ACCESS_KEY_SECRET:}
aliyun.oss.bucket=${ALIYUN_OSS_BUCKET:}
aliyun.oss.public-url-prefix=${ALIYUN_OSS_PUBLIC_URL_PREFIX:}

# Message retention policy
# 已读消息: 1天后删除
message.retention.read-days=${MESSAGE_RETENTION_READ_DAYS:1}
# 图片/视频未读消息: 3天后删除
message.retention.unread-media-days=${MESSAGE_RETENTION_UNREAD_MEDIA_DAYS:3}
# 其他未读消息最大保留天数(兜底)
message.retention.unread-nonmedia-max-days=${MESSAGE_RETENTION_UNREAD_NONMEDIA_MAX_DAYS:90}
# 每天凌晨 04:15 执行清理
message.retention.cleanup-cron=${MESSAGE_RETENTION_CLEANUP_CRON:0 15 4 * * *}
