spring.application.name=webrtc-server
server.port=${WEBRTC_SERVER_PORT:8081}

# WebRTC / Signaling Config
webrtc.mode=${WEBRTC_MODE:p2p}
webrtc.stun.url=${WEBRTC_STUN_URL:stun:stun.qq.com:3478,stun:stun.miwifi.com:3478}
webrtc.turn.url=${WEBRTC_TURN_URL:turn:192.168.252.67:3478?transport=udp,turn:192.168.252.67:3478?transport=tcp}
webrtc.turn.username=${WEBRTC_TURN_USERNAME:test}
webrtc.turn.credential=${WEBRTC_TURN_CREDENTIAL:123456}
